name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.0"
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run linter
        run: make lint

      - name: Run type checker
        run: make typecheck

      - name: Check complexity
        run: make radon

      - name: Run tests
        run: make test
